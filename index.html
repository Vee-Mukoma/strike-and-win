<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strike & Win: Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to Strike & Win</h1>
        <nav>
            <a href="">scoreboard</a>
            <a href="">rules</a>
            <a href="">history</a>
        </nav>
    </header>

    <main>
        <section id="hero-section">
            <h2>Think Fast. Strike hard. Will you outsmart your opponent?</h2>
            <button id="start-game">Start Game</button>
        </section>

        <section id="game-section" class="hidden">
            <div class="buttons-grid">
                <div class="button">
                    <img src="./images/rock.JPG" alt="rock">
                    <button id="rock">Rock</button>
                </div>
                <div class="button">
                    <img src="./images/paper.JPG" alt="paper">
                    <button id="paper">Paper</button>
                </div>
                <div class="button">
                    <img src="./images/scissors.JPG" alt="scissors">
                    <button id="scissors">Scissors</button>
                </div>
            </div>
        </section>

        <section id="output">
            <p id="player-choice"></p>
            <p id="computer-choice"></p>
            <p id="result"></p>
            <p id="score"></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Strike & Win. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
